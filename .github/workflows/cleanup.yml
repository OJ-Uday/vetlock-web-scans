name: cleanup-old-results

# Removes results/<scan_id>.json files older than 24h to keep the repo small.
# Scan results are ephemeral by design; long-term storage is not the point.

on:
  schedule:
    - cron: "17 4 * * *"  # daily, an off-peak minute so it's not on the :00 rush
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete files older than 24h
        run: |
          set -e
          find results -type f -name '*.json' -mtime +0 -print -delete
          echo "remaining:"
          ls -la results/ 2>/dev/null | head -20 || true

      - name: Commit cleanup
        run: |
          git config user.name "vetlock-scan[bot]"
          git config user.email "vetlock-scan[bot]@users.noreply.github.com"
          git add -A results/
          git diff --cached --quiet && { echo "nothing to purge"; exit 0; }
          git commit -m "cleanup: purge old scan results" -q
          git push origin main
